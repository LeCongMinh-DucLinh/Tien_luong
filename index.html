<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tính lương CB-GV-NV ngành Giáo dục</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{font-family:Segoe UI,Arial,sans-serif;background:#eef4fb;margin:0;padding:20px}
.container{max-width:900px;margin:auto;background:#fff;padding:24px;border-radius:14px;box-shadow:0 4px 12px rgba(0,0,0,.12)}
h1{text-align:center;color:#0b3d91}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
label{font-weight:600;color:#0b3d91;font-size:14px}
input,select{width:100%;padding:8px;margin-top:4px;border:1px solid #b8c7e0;border-radius:6px;box-sizing:border-box}
.buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:15px}
button{background:#0b3d91;color:#fff;border:none;padding:10px 14px;border-radius:8px;cursor:pointer}
.result{margin-top:20px;border:1px solid #d7e2f3;padding:15px;border-radius:10px;background:#f8fbff}
.line{display:flex;justify-content:space-between;margin:6px 0}
.total{font-weight:bold;color:green;font-size:18px}
footer{text-align:center;margin-top:20px;color:#666}
@media print {.buttons{display:none} body{background:#fff}}
</style>
</head>
<body>
<div class="container">
<h1>TÍNH THU NHẬP CB-GV-NV NGÀNH GIÁO DỤC</h1>

<div class="grid">
<div><label>Lương cơ sở</label><input id="lcs" type="number" value="2530000"></div>
<div><label>Đối tượng</label><select id="doiTuong"><option>Giáo viên</option><option>Cán bộ quản lý</option><option>Nhân viên</option></select></div>
<div><label>Hệ số lương</label><input id="hsl" type="number" step="0.01" value="6.04"></div>
<div><label>PC ưu đãi (%)</label><input id="uudai" type="number" value="45"></div>
<div><label>PC chức vụ (hệ số)</label><input id="cv" type="number" step="0.01" value="0.45"></div>
<div><label>PC khu vực (hệ số)</label><input id="kv" type="number" step="0.01" value="0"></div>
<div><label>PC trách nhiệm (hệ số)</label><input id="tn" type="number" step="0.01" value="0"></div>
<div><label>PC độc hại (hệ số)</label><input id="dh" type="number" step="0.01" value="0"></div>
<div><label>PC thâm niên (%)</label><input id="tnn" type="number" value="0"></div>
<div><label>PC vượt khung (%)</label><input id="vk" type="number" value="0"></div>
</div>

<div class="buttons">
<button onclick="tinhLuong()">Tính lương</button>
<button onclick="xuatPDF()">Xuất PDF</button>
<button onclick="xuatExcel()">Xuất Excel</button>
</div>

<div id="kq" class="result"></div>
<footer>© 2026 - Tính lương CB, GV, NV ngành GD - Lê Công Minh</footer>
</div>

<script>
let ketQua={};

function f(n){return Math.round(n).toLocaleString('vi-VN')+' đ';}

function tinhLuong(){
 const lcs=+lcsEl().value,hsl=+hslEl().value;
 const uudai=+document.getElementById('uudai').value;
 const cv=+document.getElementById('cv').value*lcs;
 const kv=+document.getElementById('kv').value*lcs;
 const tn=+document.getElementById('tn').value*lcs;
 const dh=+document.getElementById('dh').value*lcs;
 const tnn=+document.getElementById('tnn').value;
 const vk=+document.getElementById('vk').value;

 const luong=hsl*lcs;
 const goc=luong+cv+(luong*vk/100);
 const pcUuDai=goc*uudai/100;
 const pcTNN=goc*tnn/100;

 const tong=luong+pcUuDai+pcTNN+cv+kv+tn+dh;
 const gocBH=luong+cv+pcTNN;
 const bhyt=gocBH*0.015;
 const bhxh=gocBH*0.09;
 const thuc=tong-bhyt-bhxh;

 ketQua={luong,pcUuDai,pcTNN,cv,kv,tn,dh,tong,bhyt,bhxh,thuc};

 document.getElementById('kq').innerHTML=`
 <div class="line"><span>Lương chính</span><span>${f(luong)}</span></div>
 <div class="line"><span>PC ưu đãi</span><span>${f(pcUuDai)}</span></div>
 <div class="line"><span>PC chức vụ</span><span>${f(cv)}</span></div>
 <div class="line"><span>PC thâm niên</span><span>${f(pcTNN)}</span></div>
 <div class="line"><span>PC khu vực</span><span>${f(kv)}</span></div>
 <div class="line"><span>PC trách nhiệm</span><span>${f(tn)}</span></div>
 <div class="line"><span>PC độc hại</span><span>${f(dh)}</span></div>
 <hr>
 <div class="line"><span>Tổng trước BH</span><span>${f(tong)}</span></div>
 <div class="line"><span>BHYT</span><span>- ${f(bhyt)}</span></div>
 <div class="line"><span>BHXH+BHTN</span><span>- ${f(bhxh)}</span></div>
 <div class="line total"><span>THỰC NHẬN</span><span>${f(thuc)}</span></div>`;
}

function xuatExcel(){
 if(!ketQua.thuc){tinhLuong();}
 const data=Object.entries(ketQua);
 const ws=XLSX.utils.aoa_to_sheet([["Khoản mục","Giá trị"],...data]);
 const wb=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb,ws,"Luong");
 XLSX.writeFile(wb,"Bang_luong.xlsx");
}

async function xuatPDF(){
 if(!ketQua.thuc){tinhLuong();}
 const {jsPDF}=window.jspdf;
 const pdf=new jsPDF();
 pdf.text("Bang luong tham khao",20,20);
 let y=35;
 for(const [k,v] of Object.entries(ketQua)){ pdf.text(`${k}: ${Math.round(v).toLocaleString('vi-VN')} d`,20,y); y+=10; }
 pdf.save("Bang_luong.pdf");
}

function lcsEl(){return document.getElementById('lcs');}
function hslEl(){return document.getElementById('hsl');}
tinhLuong();
</script>
</body>
</html>
