<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính Thu Nhập CB, GV, NV Ngành...</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #fcf8ee; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            justify-content: center;
        }

        .container {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 900px; /* Độ rộng tối đa khi xem trên máy tính */
            padding: 20px;
            box-sizing: border-box;
        }

        h2 {
            color: #00469b; /* Màu xanh giống trong ảnh của bạn */
            margin-top: 0;
            font-size: 1.4rem;
            border-bottom: 2px solid #00469b;
            padding-bottom: 8px;
        }

        /* Bố cục lưới: Mặc định chia 3 cột trên Máy tính (Desktop) */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px; /* Khoảng cách giữa các ô */
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            color: #00469b;
            margin-bottom: 6px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }

        .btn-primary { background-color: #00469b; }
        .btn-danger { background-color: #dc3545; }

        /* ==================== ĐÂY LÀ PHẦN SỬA LỖI ĐIỆN THOẠI ==================== */
        /* Khi màn hình nhỏ hơn 768px (Điện thoại và máy tính bảng nhỏ) */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            /* Ép lưới chuyển từ 3 cột thành 1 cột duy nhất */
            .form-grid {
                grid-template-columns: 1fr; 
                gap: 12px;
            }

            label {
                font-size: 15px; /* Tăng nhẹ kích thước chữ trên điện thoại cho dễ đọc */
            }

            input {
                padding: 12px; /* Ô nhập liệu to hơn một chút để dễ dùng tay ấn */
            }

            .btn-group {
                flex-direction: column; /* Nút bấm cũng xếp chồng dọc */
            }
            
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>LƯƠNG VÀ PHỤ CẤP</h2>
    
    <div class="form-grid">
        <div class="form-group">
            <label>Mức lương (VNĐ)</label>
            <input type="number" placeholder="Nhập số tiền...">
        </div>
        
        <div class="form-group">
            <label>Hệ số lương</label>
            <input type="number" step="0.01" placeholder="Ví dụ: 2.34">
        </div>
        
        <div class="form-group">
            <label>Phụ cấp khác</label>
            <input type="number" value="0">
        </div>

        <div class="form-group">
            <label>Thâm niên (%)</label>
            <input type="number" value="0">
        </div>

        <div class="form-group">
            <label>Phụ cấp vượt khung (%)</label>
            <input type="number" value="0">
        </div>

        <div class="form-group">
            <label>Phụ cấp ưu đãi (%)</label>
            <input type="number" value="0">
        </div>
    </div>

    <div class="form-group" style="margin-bottom: 20px;">
        <label>Ghi chú nếu cần...</label>
        <input type="text" placeholder="Nhập ghi chú...">
    </div>
    
    <div class="btn-group">
        <button class="btn-primary">TÍNH THU NHẬP</button>
        <button class="btn-danger">XÓA NHẬP LIỆU</button>
    </div>
</div>

</body>
</html>
