<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính Lương Tham Khảo</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #fcf8ee; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #d4a373;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #c39464;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-left: 5px solid #d4a373;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Tính Lương Tham Khảo</h2>
    
    <div class="form-group">
        <label for="basicSalary">Lương cơ bản (VNĐ):</label>
        <input type="number" id="basicSalary" placeholder="Nhập lương cơ bản..." value="5000000">
    </div>
    
    <div class="form-group">
        <label for="allowance">Phụ cấp (VNĐ):</label>
        <input type="number" id="allowance" placeholder="Nhập phụ cấp nếu có..." value="500000">
    </div>
    
    <div class="form-group">
        <label for="days">Số ngày làm việc thực tế:</label>
        <input type="number" id="days" placeholder="Ví dụ: 26" value="26">
    </div>

    <button onclick="calculateSalary()">Tính Lương</button>

    <div class="result" id="resultBox">
        <strong>Tổng lương nhận được:</strong> <span id="totalSalary">0</span> VNĐ
    </div>
</div>

<script>
    function calculateSalary() {
        // Lấy giá trị từ các ô nhập liệu
        const basicSalary = parseFloat(document.getElementById('basicSalary').value) || 0;
        const allowance = parseFloat(document.getElementById('allowance').value) || 0;
        const days = parseFloat(document.getElementById('days').value) || 0;

        // Công thức tính lương tham khảo (Giả định tháng công chuẩn là 26 ngày)
        const standardDays = 26;
        const actualSalary = (basicSalary / standardDays) * days;
        const totalSalary = actualSalary + allowance;

        // Hiển thị kết quả định dạng tiền tệ đơn giản
        document.getElementById('totalSalary').innerText = Math.round(totalSalary).toLocaleString('vi-VN');
        document.getElementById('resultBox').style.display = 'block';
    }
</script>

</body>
</html>
